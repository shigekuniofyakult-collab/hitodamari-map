// ━━━ Haversine (km) ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function haversine(lat1, lng1, lat2, lng2) {
  var R = 6371;
  var dLat = (lat2 - lat1) * Math.PI / 180;
  var dLng = (lng2 - lng1) * Math.PI / 180;
  var a = Math.sin(dLat/2)*Math.sin(dLat/2)
        + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)
        * Math.sin(dLng/2)*Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function fmtDist(km) {

// ━━━ スケジュール判定 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function weekOfMonth(date) {
  // 第N○曜日の計算：日付÷7を切り上げ
  return Math.ceil(date.getDate() / 7);
}

function isAvailableNow(spot) {
  if (!spot.schedule) return true;
  var now = new Date();
  var s = spot.schedule;

  // 曜日チェック
  if (s.days) {
    var today = now.getDay(); // 0=日
    var dayMatch = false;
    for (var i = 0; i < s.days.length; i++) {
      if (s.days[i] === today) { dayMatch = true; break; }
    }
    if (!dayMatch) return false;
  }

  // 第N週チェック
  if (s.weeks) {
    var wk = weekOfMonth(now);
    var wkMatch = false;
    for (var i = 0; i < s.weeks.length; i++) {
      if (s.weeks[i] === wk) { wkMatch = true; break; }
    }
    if (!wkMatch) return false;
  }

  // 時間帯チェック
  if (s.hours) {
    var mins = now.getHours() * 60 + now.getMinutes();
    var timeMatch = false;
    for (var i = 0; i < s.hours.length; i++) {
      if (mins >= s.hours[i][0] && mins <= s.hours[i][1]) {
        timeMatch = true; break;
      }
    }
    if (!timeMatch) return false;
  }

  return true;
}

// 時間帯のラベル生成
function scheduleLabel(spot) {
  if (!spot.schedule) return '';
  var s = spot.schedule;
  var parts = [];

  if (s.days) {
    var dayNames = ['日','月','火','水','木','金','土'];
    var names = [];
    for (var i = 0; i < s.days.length; i++) names.push(dayNames[s.days[i]]);
    var prefix = s.weeks ? '第' + s.weeks.join('・') + ' ' : '';
    parts.push(prefix + names.join('・') + '曜');
  }

  if (s.hours) {
    var timeParts = [];
    for (var i = 0; i < s.hours.length; i++) {
      // 表示用：バッファを除いた本来の時間（±15分を戻す）
      var st = s.hours[i][0] + 15;
      var en = s.hours[i][1] - 15;
      var stH = Math.floor(st / 60);
      var stM = st % 60;
      var enH = Math.floor(en / 60);
      var enM = en % 60;
      timeParts.push(stH + ':' + (stM < 10 ? '0' : '') + stM + '〜' + enH + ':' + (enM < 10 ? '0' : '') + enM);
    }
    parts.push(timeParts.join(' / '));
  }

  return parts.join(' ');
}

// ━━━ 最近傍法（Nearest Neighbor）━━━━━━━━━━━━━━━━━━━━━━━━
function nearestNeighborSort(spots, startLat, startLng) {
  var result = [];
  var remaining = [];
  for (var i = 0; i < spots.length; i++) {
    remaining.push(spots[i]);
  }

  var curLat = startLat;
  var curLng = startLng;

  while (remaining.length > 0) {
    var nearestIdx = 0;
    var nearestDist = Infinity;
    for (var j = 0; j < remaining.length; j++) {
      var d = haversine(curLat, curLng, remaining[j].lat, remaining[j].lng);
      if (d < nearestDist) {
        nearestDist = d;
        nearestIdx = j;
      }
    }
    var next = remaining.splice(nearestIdx, 1)[0];
    next.routeDist = nearestDist;  // 前の地点からの距離
    next.originDist = haversine(startLat, startLng, next.lat, next.lng);
    result.push(next);
    curLat = next.lat;
    curLng = next.lng;
  }
  return result;
}

    var wpAddrs = [];
    for (var i = 0; i < wps.length; i++) {
      wpAddrs.push(encodeURIComponent(wps[i].address));
    }
    url += '&waypoints=' + wpAddrs.join('%7C');
  }
  return url;
}

// ━━━ Location ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function getLocation() {
  if (!navigator.geolocation) {
    showMsg('err', 'この端末では位置情報を利用できません');
    return;
  }
  var btn = document.getElementById('locBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner">⟳</span> 取得中...';

  navigator.geolocation.getCurrentPosition(
    function(pos) {
      myPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      btn.disabled = false;
      btn.textContent = '現在地を更新して再計算';
      showMsg('ok', '✓ 現在地を取得しました');
      render();
    },
    function(err) {
      btn.disabled = false;
      btn.textContent = '現在地を取得して近い順に並べる';
      showMsg('err', err.code === 1 ? '位置情報の許可が必要です' : '位置情報を取得できませんでした');
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

function showMsg(type, text) {
  document.getElementById('msg').innerHTML =
    '<div class="msg msg-' + type + '">' + text + '</div>';
}

// ━━━ Filter ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function setFilter(mode) {
  filterMode = mode;
  document.getElementById('fbSmart').className =
    'filter-btn' + (mode === 'smart' ? ' active' : '');
  document.getElementById('fbAll').className =
    'filter-btn' + (mode === 'all' ? ' active' : '');
  render();
}

// ━━━ Card HTML ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderCard(s, rank, isFirst, dimmed) {
  var exp = (expandedId === s.id);
  var distLabel = isFirst ? fmtDist(s.routeDist) : '← ' + fmtDist(s.routeDist);
  var hasSched = !!s.schedule;

  var html = '';
  html += '<div class="item' + (dimmed ? ' dimmed' : '') + '">';
  html +=   '<div class="item-main" onclick="toggle(' + s.id + ')">';
  if (rank !== null) {
    html +=   '<div class="item-rank">' + rank + '</div>';
  }
  html +=     '<div class="item-body">';
  html +=       '<div class="item-top">';
  html +=         '<span class="item-cat cat-' + s.cat + '">' + CAT_ICON[s.cat] + ' ' + s.cat + '</span>';
  html +=         '<span class="item-dist">' + distLabel + '</span>';
  if (hasSched && !dimmed) {
    html +=       '<span class="item-badge badge-time">⏰ 時間帯</span>';
  }
  if (dimmed) {
    html +=       '<span class="item-badge badge-off">時間外</span>';
  }
  html +=       '</div>';
  html +=       '<div class="item-name">' + s.name + '</div>';
  html +=       '<div class="item-memo">' + s.memo + '</div>';
  html +=     '</div>';
  html +=     '<div class="item-arrow">' + (exp ? '▲' : '▼') + '</div>';
  html +=   '</div>';

  if (exp) {
    html += '<div class="item-detail">';
    html +=   '<div class="item-addr">📮 ' + s.address + '</div>';
    html +=   '<div class="item-dist-detail">';
    html +=     '📍 出発地から ' + fmtDist(s.originDist);
    if (!isFirst) {
      html +=   ' ← 前の地点から ' + fmtDist(s.routeDist);
    }
    html +=   '</div>';
    html +=   '<div class="item-actions">';
    html +=     '<a class="action-btn bg-green" href="' + mapUrl(s) + '" target="_blank">📍 マップで見る</a>';
    html +=     '<a class="action-btn bg-blue" href="' + singleNavUrl(s) + '" target="_blank">🧭 ナビ開始</a>';
    html +=   '</div>';
    html += '</div>';
  }

  html += '</div>';
  return html;
}

// ━━━ Render ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function render() {
  var listEl = document.getElementById('list');
  var navBtn = document.getElementById('navBtn');
  var filterBar = document.getElementById('filterBar');
  var filterCount = document.getElementById('filterCount');

  if (!myPos) {
    listEl.innerHTML = '';
    return;
  }

  // Show filter bar
  filterBar.classList.remove('hidden');
  filterCount.classList.remove('hidden');

  // ── 個人宅を分離 ──
  var routeSpots = [];
  var personalSpots = [];
  for (var i = 0; i < SPOTS.length; i++) {
    // コピーを作る
    var copy = {};
    for (var k in SPOTS[i]) copy[k] = SPOTS[i][k];
    if (SPOTS[i].personal) {
      personalSpots.push(copy);
    } else {
      routeSpots.push(copy);
    }
  }

  // ── フィルター適用 ──
  var availableSpots = [];
  var unavailableSpots = [];

  if (filterMode === 'smart') {
    for (var i = 0; i < routeSpots.length; i++) {
      if (isAvailableNow(routeSpots[i])) {
        availableSpots.push(routeSpots[i]);
      } else {
        unavailableSpots.push(routeSpots[i]);
      }
    }
  } else {
    availableSpots = routeSpots;
    unavailableSpots = [];
  }

  // ── ルート順ソート ──
  var sorted = nearestNeighborSort(availableSpots, myPos.lat, myPos.lng);

  // ── ナビボタン ──
  if (sorted.length > 0) {
    var navSpots = sorted.slice(0, 10);
    navBtn.href = multiNavUrl(navSpots);
    var navLabel = filterMode === 'smart'
      ? '🗺️ 今行けるルートでナビ（' + navSpots.length + '件）'
      : '🗺️ Googleマップでナビ開始（ルート順' + navSpots.length + '件）';
    navBtn.textContent = navLabel;
    navBtn.classList.remove('hidden');
  } else {
    navBtn.classList.add('hidden');
  }

  // ── カウント表示 ──
  var totalRoute = routeSpots.length;
  if (filterMode === 'smart') {
    filterCount.textContent = '🕐 今行けるスポット: ' + sorted.length + ' / ' + totalRoute + '件'
      + '（個人宅 ' + personalSpots.length + '件は別表示）';
  } else {
    filterCount.textContent = '📋 全' + totalRoute + '件のルート'
      + '（個人宅 ' + personalSpots.length + '件は別表示）';
  }

  // ── HTML組み立て ──
  var html = '';

  // メインリスト（ルート順）
  if (sorted.length > 0) {
    for (var i = 0; i < sorted.length; i++) {
      html += renderCard(sorted[i], i + 1, i === 0, false);
    }
  } else {
    html += '<div class="msg msg-err">現在の時間帯に該当するスポットがありません。「すべて表示」に切り替えてください。</div>';
  }

  // 時間外セクション（smartモードのみ）
  if (unavailableSpots.length > 0) {
    // 時間外スポットも出発地からの距離でソート（ルート計算ではないので単純距離）
    for (var i = 0; i < unavailableSpots.length; i++) {
      unavailableSpots[i].originDist = haversine(myPos.lat, myPos.lng, unavailableSpots[i].lat, unavailableSpots[i].lng);
      unavailableSpots[i].routeDist = unavailableSpots[i].originDist;
    }
    unavailableSpots.sort(function(a, b) { return a.originDist - b.originDist; });

    html += '<div class="section-header">⏰ 今は時間外（' + unavailableSpots.length + '件）</div>';
    for (var i = 0; i < unavailableSpots.length; i++) {
      html += renderCard(unavailableSpots[i], null, true, true);
    }
  }

  // 個人宅セクション（常に表示）
  if (personalSpots.length > 0) {
    for (var i = 0; i < personalSpots.length; i++) {
      personalSpots[i].originDist = haversine(myPos.lat, myPos.lng, personalSpots[i].lat, personalSpots[i].lng);
      personalSpots[i].routeDist = personalSpots[i].originDist;
    }
    personalSpots.sort(function(a, b) { return a.originDist - b.originDist; });

    html += '<div class="section-header">🏠 個別訪問（' + personalSpots.length + '件）</div>';
    for (var i = 0; i < personalSpots.length; i++) {
      html += renderCard(personalSpots[i], null, true, false);
    }
  }

  listEl.innerHTML = html;
}

function toggle(id) {
  expandedId = (expandedId === id) ? null : id;
  render();
}

// ━━━ Init ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
render();
</script>
